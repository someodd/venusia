name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to simulate (e.g., v1.0.0-test)'
        required: true
        default: 'v1.0.0-test'
      skip_publish:
        description: 'Skip actual publishing of release'
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set version
      run: |
        if [[ "${{ github.event_name }}" == "push" ]]; then
          # For a tag 'v1.2.3', GITHUB_REF_NAME is 'v1.2.3'. This preserves the 'v'.
          echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
        else
          # For manual runs, use the input directly (e.g., 'v1.0.0-test')
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
        fi

    - uses: haskell-actions/setup@v2
      with:
        enable-stack: true
        stack-version: '2.15.7'
        # GHC comes from stack.yaml's resolver; don't double-install.

    - name: Cache ~/.stack and .stack-work
      uses: actions/cache@v4
      with:
        path: |
          ~/.stack
          .stack-work
        key: ${{ runner.os }}-stack-${{ hashFiles('stack.yaml.lock', 'package.yaml') }}
        restore-keys: |
          ${{ runner.os }}-stack-

    - name: Test
      run: stack test

    - name: Build with Stack
      run: stack build --copy-bins --local-bin-path ./dist

    - name: Create Debian package
      run: |
        sudo gem install fpm

        # --- (Package creation steps) ---
        mkdir -p pkg/usr/bin
        mkdir -p pkg/lib/systemd/system
        mkdir -p pkg/usr/share/venusia
        cp ./dist/Venusia-exe pkg/usr/bin/venusia
        chmod +x pkg/usr/bin/venusia
        # Demo routes.toml shipped at /usr/share/venusia/default-routes.toml.
        # post-install.sh seeds it into /var/gopher/ on first install only —
        # existing routes.toml files survive upgrades untouched.
        cp packaging/default-routes.toml pkg/usr/share/venusia/default-routes.toml
        cat <<'EOF' > pkg/lib/systemd/system/venusia.service
        [Unit]
        Description=Venusia Gopher Server
        After=network.target
        [Service]
        Type=simple
        User=venusia
        Group=venusia
        # The 'watch' subcommand requires WATCH_DIR HOST PORT as positional args.
        # Default below binds to loopback on port 7070 (unprivileged) and
        # serves out of /var/gopher (also where routes.toml lives). To expose
        # publicly or change the watch directory, drop a file at
        # /etc/systemd/system/venusia.service.d/override.conf with:
        #   [Service]
        #   ExecStart=
        #   ExecStart=/usr/bin/venusia watch /var/gopher gopher.example.com 70
        # Then: systemctl daemon-reload && systemctl restart venusia
        ExecStart=/usr/bin/venusia watch /var/gopher 127.0.0.1 7070
        Restart=on-failure
        [Install]
        WantedBy=multi-user.target
        EOF
        cat <<'EOF' > ./pre-install.sh
        #!/bin/sh
        set -e
        if ! getent group venusia >/dev/null; then groupadd --system venusia; fi
        if ! id -u venusia >/dev/null 2>&1; then useradd --system --no-create-home --home-dir /nonexistent --shell /usr/sbin/nologin -g venusia venusia; fi
        install -d -o venusia -g venusia -m 0770 /var/gopher
        EOF
        chmod +x ./pre-install.sh
        cat <<'EOF' > ./post-install.sh
        #!/bin/sh
        set -e
        # Seed a demo routes.toml on first install. Don't overwrite on upgrade.
        if [ ! -e /var/gopher/routes.toml ]; then
          install -o venusia -g venusia -m 0640 \
            /usr/share/venusia/default-routes.toml \
            /var/gopher/routes.toml
        fi
        systemctl daemon-reload
        systemctl enable venusia.service
        systemctl start venusia.service
        EOF
        chmod +x ./post-install.sh
        cat <<'EOF' > ./pre-uninstall.sh
        #!/bin/sh
        set -e
        systemctl stop venusia.service
        systemctl disable venusia.service
        EOF
        chmod +x ./pre-uninstall.sh

        # Actually create the package!
        fpm -s dir -t deb -n venusia -v ${{ env.VERSION }} \
          --description "Venusia Gopher server" \
          --maintainer "someodd <someodd@pm.me>" \
          --url "https://github.com/someodd/Venusia" \
          --license "BSD-3-Clause" \
          --depends libc6 --depends libgmp10 --depends zlib1g \
          --before-install ./pre-install.sh \
          --after-install ./post-install.sh \
          --before-remove ./pre-uninstall.sh \
          -C pkg usr/bin/venusia lib/systemd/system/venusia.service \
                 usr/share/venusia/default-routes.toml

    - name: Release
      uses: softprops/action-gh-release@v1
      # This condition to skip publishing remains the same
      if: |
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_publish == false)
      with:
        files: "*.deb"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
